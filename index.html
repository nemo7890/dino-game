<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crazy Dinos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="light-mode">
    <div id="app">
        <!-- Auth / Login Screen -->
        <div id="auth-screen" class="screen">
            <h1>DINO MULTIPLAYER</h1>
            <div class="auth-buttons">
                <button id="google-login-btn">Login with Google</button>
                <button id="guest-login-btn">Play as Guest</button>
            </div>
        </div>

        <!-- Guest Name Entry Modal -->
        <div id="guest-modal" class="modal hidden">
            <div class="modal-content">
                <h3>Enter Your Nickname</h3>
                <input type="text" id="guest-name-input" placeholder="crazy dino">
                <button id="confirm-guest-btn">Start Playing</button>
            </div>
        </div>

        <!-- Main Menu Screen -->
        <div id="menu-screen" class="screen hidden">
            <nav>
                <button id="theme-toggle">🌓</button>
                <div id="user-info"></div>
            </nav>
            <div class="menu-content">
                <button id="solo-mode-btn" class="primary-btn">SOLO MODE</button>
                <hr>
                <h3 style="margin-top:0">Multiplayer</h3>
                <button id="random-match-btn">Random Match</button>
                <button id="room-system-btn">Room System</button>
                
                <div id="room-controls" class="hidden">
                    <button id="create-room-btn">Create Private Room</button>
                    <div class="join-area">
                        <input type="text" id="join-code-input" placeholder="Room Code">
                        <button id="join-btn">Join</button>
                    </div>
                </div>
            </div>
            <footer>
                <button id="dev-btn">Developer</button>
                <button id="donate-btn">Donate</button>
            </footer>
        </div>

        <!-- Matchmaking Screen -->
        <div id="matchmaking-screen" class="screen hidden">
            <h2 id="status-text">Searching for players...</h2>
            <div id="room-info" class="hidden">
                <p>Room: <span id="display-code" style="font-weight:bold; color:#2ecc71"></span> 
                   <button id="copy-code" style="padding:5px 10px; font-size:12px">Copy</button>
                </p>
                <button id="copy-link" style="padding:5px 10px; font-size:12px">Copy Invite Link</button>
            </div>
            <div class="player-list" id="waiting-players"></div>
            <p style="font-size: 0.9rem; opacity: 0.7;">Waiting for at least 2 players to start...</p>
            <button id="cancel-match-btn" class="danger-btn">Cancel Match</button>
        </div>

        <!-- Game Screen -->
        <div id="game-screen" class="screen hidden">
            <div id="game-hud">
                <div id="leaderboard"></div>
                <button id="leave-game-btn">Leave</button>
            </div>
            <canvas id="gameCanvas"></canvas>
            <p class="mobile-hint">Tap screen to jump</p>
        </div>

        <!-- Utility Modals -->
        <div id="dev-modal" class="modal hidden">
            <div class="modal-content">
                <h3>Developer</h3>
                <p>Argha</p>
                <a href="https://x.com/kolkataboy2772?s=20">Twitter</a> | <a href="https://github.com/nemo7890">GitHub</a>
                <br><br>
                <button class="close-modal">Close</button>
            </div>
        </div>

        <div id="donate-modal" class="modal hidden">
            <div class="modal-content">
                <h3>Donate</h3>
                <p>UPI ID:argha77@fam </p>
                <p>BTC:bc1q46grhnqr8uhywqz9w4407908ppk74hlma87gpw</p>
                <button class="close-modal">Close</button>
            </div>
        </div>
    </div>

    <!-- Script Imports -->
    <script type="module" src="firebase-config.js"></script>
    <script type="module" src="script.js"></script>
</body>
</html>
